<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Agenda Lunaris</title>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-4">

    <h1 class="text-center mb-4">
        🚐 Agenda Lunaris
    </h1>

    <div class="row">

        <div class="col-12 mb-3"
             th:each="day : ${agenda}">

            <a th:href="@{/agenda/{date}(date=${day.date})}"
               class="text-decoration-none text-dark">

                <div class="card shadow-sm">

                    <div class="card-body">

                        <h4>
                            📅
                            <span th:text="${day.date}"></span>
                        </h4>

                        <hr>

                        <p>
                            👥 Pasajeros:
                            <strong th:text="${day.totalPassengers}"></strong>
                        </p>

                        <p>
                            ⚠️ Pagos Pendientes:
                            <strong th:text="${day.pendingPayments}"></strong>
                        </p>

                        <p>
                            🚗 Vehículos Estimados:
                            <strong th:text="${day.estimatedVehicles}"></strong>
                        </p>

                    </div>

                </div>

            </a>

        </div>

    </div>

    <div class="mt-3">

        <a href="/reservations/new"
           class="btn btn-primary w-100">

            ➕ Nueva Reserva

        </a>

    </div>

</div>

</body>

</html>
