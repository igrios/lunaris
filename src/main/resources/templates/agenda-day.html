<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
  <title>Detalle del Día</title>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

  <div class="container mt-4">

    <h1 class="text-center mb-4">
      🚐 Viajes del Día
    </h1>

    <div class="card shadow mb-3">

      <div class="card-body">

        <h4>
          📅 <span th:text="${date}"></span>
        </h4>

      </div>

    </div>

    <div th:each="reservation : ${reservations}" class="card shadow-sm mb-3">

      <div class="card-body">

        <h5>
          👤
          <span th:text="${reservation.passenger.firstName}"></span>
          <span th:text="${reservation.passenger.lastName}"></span>
        </h5>

        <p>
          📍
          <strong>Retiro:</strong>
          <span th:text="${reservation.pickupLocality}"></span>
        </p>

        <p>
          🏁
          <strong>Destino:</strong>
          <span th:text="${reservation.destination}"></span>
        </p>

        <p th:if="${reservation.pickupAddress != null and !reservation.pickupAddress.isBlank()}">
          🏠
          <strong>Dirección:</strong>
          <span th:text="${reservation.pickupAddress}"></span>
        </p>

        <p>
          📞
          <span th:text="${reservation.passenger.phone}"></span>
        </p>

        <p th:if="${reservation.paymentVerified}">
          ✅ Pagado
        </p>

        <p th:unless="${reservation.paymentVerified}">
          ⚠️ Pago Pendiente
        </p>

        <p th:if="${reservation.notes != null and !reservation.notes.isEmpty()}">
          📝
          <span th:text="${reservation.notes}"></span>
        </p>

      </div>

    </div>

    <a href="/agenda" class="btn btn-secondary w-100">

      ← Volver

    </a>

  </div>

</body>

</html>
