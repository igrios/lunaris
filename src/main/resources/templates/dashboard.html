<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Lunaris Ansenuza</title>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

    <div class="container mt-4">

        <h1 class="text-center mb-4">
            🚐 Lunaris Ansenuza
        </h1>

        <div class="row mb-3">

            <div class="col-md-6">
                <a href="/reservations/new" class="btn btn-primary w-100">
                    ➕ Nueva Reserva
                </a>
            </div>

            <div class="col-md-6">
                <a href="/agenda" class="btn btn-success w-100">
                    📅 Agenda
                </a>
            </div>

        </div>

        <div class="card shadow">

            <div class="card-body">

                <h3>
                    Operación de Hoy
                </h3>

                <hr>

                <p>
                    <strong>Fecha:</strong>
                    <span th:text="${summary.travelDate}"></span>
                </p>

                <p>
                    <strong>Pasajeros:</strong>
                    <span th:text="${summary.totalReservations}"></span>
                </p>

                <p>
                    <strong>Pagos verificados:</strong>
                    <span th:text="${summary.paidReservations}"></span>
                </p>

                <p>
                    <strong>Pagos pendientes:</strong>
                    <span th:text="${summary.pendingPayments}"></span>
                </p>

                <p>
                    <strong>Vehículos estimados:</strong>
                    <span th:text="${summary.estimatedVehicles}"></span>
                </p>

            </div>

        </div>

    </div>

</body>

</html>
