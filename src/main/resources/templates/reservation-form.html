<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Nueva Reserva</title>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

    <div class="container mt-4 mb-5">

        <div class="card shadow">

            <div class="card-body">

                <h2 class="mb-4">
                    🚐 Nueva Reserva
                </h2>

                <form th:action="@{/reservations/new}" th:object="${reservation}" method="post">

                    <h4 class="mb-3">
                        Datos del Pasajero
                    </h4>

                    <div class="mb-3">
                        <label class="form-label">
                            Nombre
                        </label>

                        <input type="text" class="form-control" th:field="*{firstName}">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">
                            Apellido
                        </label>

                        <input type="text" class="form-control" th:field="*{lastName}">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">
                            Teléfono
                        </label>

                        <input type="text" class="form-control" th:field="*{phone}">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">
                            CUIL (opcional)
                        </label>

                        <input type="text" class="form-control" th:field="*{cuil}">
                    </div>



                    <hr>

                    <h4 class="mt-4 mb-3">
                        Datos del Viaje
                    </h4>

                    <div class="mb-3">
                        <label class="form-label">
                            Fecha del Viaje
                        </label>

                        <input type="date" class="form-control" th:field="*{travelDate}">
                    </div>

                    <div class="mb-3">

                        <label class="form-label">
                            Localidad de Retiro
                        </label>

                        <select class="form-select" th:field="*{pickupLocality}">

                            <option value="">
                                Seleccionar localidad
                            </option>

                            <option th:each="locality : ${localities}" th:value="${locality.name}"
                                th:text="${locality.name}">
                            </option>

                        </select>

                    </div>

                    <div class="mb-3">
                        <label class="form-label">
                            Dirección de Retiro
                        </label>

                        <input type="text" class="form-control" th:field="*{pickupAddress}">
                    </div>

                    <div class="mb-3">

                        <label class="form-label">
                            Destino
                        </label>

                        <select class="form-select" th:field="*{destination}">

                            <option value="">
                                Seleccionar destino
                            </option>

                            <option th:each="locality : ${localities}" th:value="${locality.name}"
                                th:text="${locality.name}">
                            </option>

                        </select>

                    </div>

                    <div class="form-check mb-3">

                        <input class="form-check-input" type="checkbox" th:field="*{paymentVerified}">

                        <label class="form-check-label">
                            Pago Verificado
                        </label>

                    </div>

                    <div class="mb-4">
                        <label class="form-label">
                            Observaciones
                        </label>

                        <textarea class="form-control" rows="3" th:field="*{notes}">
                    </textarea>
                    </div>

                    <button type="submit" class="btn btn-primary w-100">

                        Guardar Reserva

                    </button>

                </form>

            </div>

        </div>

    </div>

</body>

</html>
